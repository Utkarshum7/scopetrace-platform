name: Backend CI

# Runs on every push (any branch — this project works on long-lived phase
# branches pushed directly, not one PR per commit, so gating only on
# pull_request would mean CI never runs at all) and on pull requests, plus
# workflow_dispatch for a manual re-run. Never triggers a deploy — Render
# deploys independently via its own git-connected webhook (render.yaml),
# entirely decoupled from this file.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancels a superseded run when new commits land on the same branch/PR
# while a previous run is still in progress — avoids burning CI minutes on
# runs whose result no longer matters.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Test (Postgres + Redis)
    runs-on: ubuntu-latest
    # Real service containers, not sqlite/no-broker — matches the roadmap's
    # "backend tests w/ Postgres+Redis service containers" requirement for
    # higher-fidelity CI than a bare sqlite run.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scopetrace_ci
          POSTGRES_USER: scopetrace
          POSTGRES_PASSWORD: scopetrace
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U scopetrace -d scopetrace_ci"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      # DEBUG=True keeps STORAGE_BACKEND at its 'local' default (gated on
      # DEBUG, same as docker-compose.yml's fail-closed rule) — no MinIO/S3
      # service container needed for correctness; MEDIA_ROOT is already
      # gated to a temp dir under _TESTING exactly like every local test run
      # all session. DATABASE_URL/REDIS_URL still point at the REAL service
      # containers above, which is the actual fidelity improvement over a
      # bare sqlite/eager-only run — DEBUG=True does not bypass that, it
      # only controls the STORAGE_BACKEND/DATABASE_URL fail-closed checks.
      DEBUG: "True"
      SECRET_KEY: ci-only-throwaway-secret-key
      DATABASE_URL: postgres://scopetrace:scopetrace@localhost:5432/scopetrace_ci
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      # --exclude-tag=ai_advisory: Phase 7a.5's Tier 2 (LLM-judge/
      # qualitative) evaluation tests are deliberately excluded from this
      # blocking job — see the ai-evaluation-advisory job below, which runs
      # them with continue-on-error. Everything else in apps.ai (Tier 1:
      # schema validation, provider contract, replay provider, invariant
      # tests, deterministic regressions) is untagged and runs here,
      # blocking, same as every other backend test.
      - name: Run backend test suite
        run: python manage.py test --verbosity 2 --exclude-tag=ai_advisory

  ai-evaluation-advisory:
    name: AI Evaluation (Tier 2, advisory)
    runs-on: ubuntu-latest
    # Same Postgres+Redis fidelity as the blocking `test` job above — the
    # judge framework tests register real AIPromptVersion rows, and future
    # capability milestones (7b+) will extend this job with real
    # golden-dataset-driven quality scoring, which should run at the same
    # fidelity as everything else, not a lower-fidelity sqlite shortcut.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scopetrace_ci
          POSTGRES_USER: scopetrace
          POSTGRES_PASSWORD: scopetrace
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U scopetrace -d scopetrace_ci"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      DEBUG: "True"
      SECRET_KEY: ci-only-throwaway-secret-key
      DATABASE_URL: postgres://scopetrace:scopetrace@localhost:5432/scopetrace_ci
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Advisory, not blocking: LLM-judge/qualitative scoring is inherently
      # non-deterministic once a real provider is involved (none is, here --
      # AI_PROVIDER defaults to 'echo' in DEBUG, so this specific run is
      # actually deterministic too — but the JOB stays advisory because a
      # future capability milestone's quality scoring against a real
      # provider will not be, and this is where that lands). Matches the
      # security/pip-audit job's existing precedent — see docs/CI_CD.md and
      # docs/AI_EVALUATION.md.
      - name: AI evaluation (Tier 2, advisory)
        continue-on-error: true
        run: python manage.py test --verbosity 2 --tag=ai_advisory

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

  security:
    name: Security scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Advisory, not blocking: pre-existing findings in current
      # dependencies may need version bumps with their own testing burden,
      # separate from whatever change actually triggered this run — see
      # docs/CI_CD.md. Full output is still always visible in the log below.
      - name: pip-audit (advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt
