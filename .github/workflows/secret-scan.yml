name: Secret Scan

# Phase 6f — advisory secret-scanning over the full repository history
# (gitleaks). Closes the gap flagged in docs/SECURITY.md §4/§9: no
# automated check ever confirmed a credential wasn't accidentally
# committed historically. Runs on every push/PR, like the other two
# workflows (backend-ci.yml, frontend-ci.yml) — this project works on
# long-lived phase branches pushed directly, not one PR per commit, so
# gating only on pull_request would mean this never runs at all.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, not just the latest commit

      # Advisory, not blocking — matches pip-audit/npm audit's established
      # pattern (see docs/CI_CD.md §1.2): a first scan against full,
      # pre-existing history could surface findings (real or false-
      # positive) that need their own triage before this can safely
      # become a hard gate.
      - name: gitleaks (advisory)
        continue-on-error: true
        run: |
          # Phase 7.5 (H4-9): pinned to a specific version, not :latest --
          # the one workflow whose job is supply-chain integrity was
          # itself pulling an unpinned image, undermining that guarantee.
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 \
            git /repo --no-banner -v
