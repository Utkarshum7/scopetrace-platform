# ScopeTrace — local development / portable deployment stack.
#
# Brings up PostgreSQL (persistent named volume), the Django API, and the built
# frontend. The API runs with DEBUG=False to mirror production configuration,
# with TLS redirect/secure cookies disabled for local plain-HTTP use.
#
#   docker compose up --build
#   API:      http://localhost:8000/api/     Health: http://localhost:8000/healthz
#   Admin:    http://localhost:8000/admin/   (admin / admin12345 by default)
#   Frontend: http://localhost:8080
#
# Data persists in the `pgdata` volume across restarts and rebuilds — the whole
# point of Phase 0 (no more ephemeral SQLite).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scopetrace}
      POSTGRES_USER: ${POSTGRES_USER:-scopetrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scopetrace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scopetrace} -d ${POSTGRES_DB:-scopetrace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-docker-compose-local-secret-not-for-production}
      ALLOWED_HOSTS: "localhost,127.0.0.1,api"
      DATABASE_URL: "postgres://${POSTGRES_USER:-scopetrace}:${POSTGRES_PASSWORD:-scopetrace}@db:5432/${POSTGRES_DB:-scopetrace}"
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
      # Local plain-HTTP: disable TLS redirect / secure-only cookies.
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      # Seed on startup so the stack is immediately usable.
      BOOTSTRAP_DATA: "true"
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin12345}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@scopetrace.local}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
