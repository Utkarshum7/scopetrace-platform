# SPA routing — fall back to index.html so client-side routes resolve.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Phase 9c: CONFIRMED gap -- no security headers were set at all. These
    # four are safe, standard, zero-risk additions (unlike a Content-Security-
    # Policy, which needs every legitimate script/style/connect source
    # enumerated and verified in a real browser before shipping -- reviewed
    # and deliberately deferred, see this milestone's report). Mirrors
    # backend/config/settings.py's own SECURE_REFERRER_POLICY = 'same-origin'
    # so both halves of the stack agree.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
